<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osarodion Igbinigie | Portfolio</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap');
        :root{--bg:#0A0A0A;--surf:#141414;--card:#1A1A1A;--bdr:#242424;--acc:#F5A623;--text:#F0EDE6;--muted:#666;}
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;margin:0;padding:0;}
        .photo-box{width:320px;height:400px;border-radius:14px;overflow:hidden;border:1px solid var(--bdr);}
        img{width:100%;height:100%;object-fit:cover;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const ROLES = ["AI Automation Builder","n8n Workflow Engineer","LLM Integration Specialist","Frontend Developer"];

        function Portfolio() {
            const [text, setText] = useState("");
            useEffect(() => {
                let i = 0;
                const interval = setInterval(() => {
                    setText(ROLES[i % ROLES.length]);
                    i++;
                }, 2000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div style={{padding: '50px'}}>
                    <h1 style={{fontSize: '60px', fontWeight: '700', fontFamily: 'Space Grotesk'}}>Osarodion Igbinigie</h1>
                    <h2 style={{color: '#F5A623', fontSize: '24px'}}>{text}</h2>
                    <div className="photo-box" style={{marginTop: '20px'}}>
                        <img src="assests/oscar.jpg" alt="Osarodion Igbinigie" />
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Portfolio />);
    </script>
</body>
</html>
